<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistem iPlacement</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Header -->
  <header>
    <h1>Sistem iPlacement</h1>
    <p>Portal Carian Syarikat Latihan Industri ADTEC Sandakan</p>
    <button onclick="scrollToSearch()">Mula Carian</button>
  </header>

  <!-- Carian -->
  <section id="search-section">
    <h2>Carian Syarikat</h2>
    <input id="filterNegeri" placeholder="Negeri">
    <input id="filterDaerah" placeholder="Daerah">
    <input id="filterJenis" placeholder="Jenis">
    <button onclick="filterCompanies()">Cari</button>
    <div id="companyList"></div>
  </section>

  <!-- Dokumen -->
  <section id="documents">
    <h2>Dokumen Rujukan LI</h2>
    <ul id="docList"></ul>
  </section>

  <script src="app.js"></script>
</body>
</html>
